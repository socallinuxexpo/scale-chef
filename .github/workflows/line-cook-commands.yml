name: Line Cook - Command handler

on:
  issue_comment:
    types: [created]

# Ensure only one bot run executes at a time across all triggers
concurrency:
  group: line-cook
  cancel-in-progress: false  # Queue runs instead of canceling

jobs:
  split:
    name: Handle '#linecook' commands
    uses: jaymzh/chef-cookbooks/.github/workflows/reusable-fbchefsync-bot.yml@bot
    with:
      python_version: '3.11'
      line_cook_repo_url: https://github.com/jaymzh/chef-cookbooks
      line_cook_repo_branch: bot
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
