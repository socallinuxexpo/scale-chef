name: Line Cook - Command handler

on:
  issue_comment:
    types: [created]

# Ensure only one bot run executes at a time across all triggers
concurrency:
  group: line-cook
  cancel-in-progress: false  # Queue runs instead of canceling

jobs:
  split:
    name: Handle '#linecook' commands
    uses: jaymzh/line-cook/.github/workflows/reusable-line-cook.yml@initial_version
    with:
      python_version: '3.11'
      line_cook_repo_ref: initial_version
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
