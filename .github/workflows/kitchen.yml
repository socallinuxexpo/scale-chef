name: Kitche tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kitchen-tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - centos-stream-9
          - centos-stream-10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Install dependencies
        run: |
          gem install bundler
          bundle install
